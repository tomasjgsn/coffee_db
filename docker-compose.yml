services:
  postgres:
    image: postgres:16-alpine
    container_name: coffee_db_postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER:-coffee_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-coffee_pass}
      POSTGRES_DB: ${DATABASE_NAME:-coffee_db}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
      - ./database/init.sh:/docker-entrypoint-initdb.d/00_init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-coffee_user} -d ${DATABASE_NAME:-coffee_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

